<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mandelbrot Scratchpad</title>
    <script type="module" crossorigin src="/assets/index-B4ELQFyf.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-C4hxxAWf.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="controls-panel">
        <h1>Mandelbrot Scratchpad</h1>
        <p class="subtitle">Single-threaded proof of concept for canvas performance.</p>

        <label>
          <span>Canvas width</span>
          <input id="widthInput" type="number" min="200" max="2000" step="50" value="800" />
        </label>

        <label>
          <span>Canvas height</span>
          <input id="heightInput" type="number" min="200" max="2000" step="50" value="600" />
        </label>

        <label>
          <span>Max iterations</span>
          <input id="iterationsInput" type="range" min="32" max="2000" step="8" value="256" />
          <output id="iterationsOutput">256</output>
        </label>

        <label>
          <span>Tile width</span>
          <input id="tileWidthInput" type="range" min="8" max="512" step="8" value="64" />
          <output id="tileWidthOutput">64</output>
        </label>

        <label>
          <span>Tile height</span>
          <input id="tileHeightInput" type="range" min="8" max="512" step="8" value="64" />
          <output id="tileHeightOutput">64</output>
        </label>

        <label>
          <span>Worker count</span>
          <input id="workerCountInput" type="range" min="1" max="8" step="1" value="4" />
          <output id="workerCountOutput">4</output>
        </label>

        <label>
          <span>Chunk mode</span>
          <select id="chunkModeInput">
            <option value="rectangles">Rectangles</option>
            <option value="none">No chunking</option>
          </select>
        </label>

        <label>
          <span>Zoom mode</span>
          <select id="zoomModeInput">
            <option value="instant">Instant</option>
            <option value="smooth">Smooth</option>
          </select>
        </label>

        <label>
          <span>Zoom sensitivity</span>
          <input id="zoomSensitivityInput" type="range" min="0.5" max="3" step="0.1" value="1" />
          <output id="zoomSensitivityOutput">1.0</output>
        </label>

        <label>
          <span>Canvas fill</span>
          <input id="fillViewportInput" type="checkbox" />
        </label>

        <label>
          <span>Preview mode</span>
          <select id="previewModeInput">
            <option value="current">Current</option>
            <option value="legacy">Legacy preview</option>
          </select>
        </label>

        <div class="color-section">
          <h2>Colors</h2>

          <label>
            <span>Color mode</span>
            <select id="colorModeInput">
              <option value="black-white">Black & white</option>
              <option value="escape-time">Escape-time</option>
              <option value="smooth">Smooth</option>
              <option value="distance-estimation">Distance estimation</option>
            </select>
          </label>

          <label>
            <span>Color palette</span>
            <select id="paletteInput">
              <option value="viridis">Viridis</option>
              <option value="plasma">Plasma</option>
              <option value="inferno">Inferno</option>
              <option value="magma">Magma</option>
              <option value="turbo">Turbo</option>
              <option value="rainbow">Rainbow</option>
              <option value="cividis">Cividis</option>
              <option value="cool">Cool</option>
              <option value="warm">Warm</option>
              <option value="grayscale">Grayscale</option>
            </select>
          </label>

          <label>
            <span>Color cycles</span>
            <input id="colorCyclesInput" type="range" min="1" max="8" step="1" value="1" />
            <output id="colorCyclesOutput">1</output>
          </label>

          <label>
            <span>Reverse colors</span>
            <input id="reverseColorsInput" type="checkbox" />
          </label>

          <label>
            <span>Smooth coloring</span>
            <input id="smoothColoringInput" type="checkbox" checked />
          </label>

          <label>
            <span>Auto-adjust palette</span>
            <input id="autoAdjustColorsInput" type="checkbox" checked />
          </label>

          <label>
            <span>Palette min iterations</span>
            <input id="paletteMinInput" type="range" min="0" max="2000" step="8" value="0" />
            <output id="paletteMinOutput">0</output>
          </label>

          <label>
            <span>Palette max iterations</span>
            <input id="paletteMaxInput" type="range" min="1" max="2000" step="8" value="256" />
            <output id="paletteMaxOutput">256</output>
          </label>

          <label>
            <span>Hue shift</span>
            <input id="hueShiftInput" type="range" min="0" max="360" step="1" value="0" />
            <output id="hueShiftOutput">0°</output>
          </label>

          <label>
            <span>Saturation</span>
            <input id="saturationInput" type="range" min="0" max="2" step="0.05" value="1" />
            <output id="saturationOutput">1.0</output>
          </label>

          <label>
            <span>Lightness</span>
            <input id="lightnessInput" type="range" min="0" max="2" step="0.05" value="1" />
            <output id="lightnessOutput">1.0</output>
          </label>

          <label>
            <span>Color space</span>
            <select id="colorSpaceInput">
              <option value="hsl">HSL</option>
              <option value="hsluv">HSLuv</option>
              <option value="lch">LCh</option>
              <option value="okhsl">Okhsl</option>
            </select>
          </label>
        </div>

        <div class="button-row">
          <button id="renderButton" type="button">Render</button>
          <button id="resetButton" type="button">Reset view</button>
        </div>

        <div class="button-row">
          <button id="exportLogsButton" type="button">Export logs</button>
          <button id="benchmarkButton" type="button">Benchmark sweep</button>
        </div>

        <div class="stats-card">
          <div><strong>Last render:</strong> <span id="lastRenderOutput">—</span></div>
          <div><strong>Zoom:</strong> <span id="zoomOutput">1.00×</span></div>
          <div><strong>Iterations:</strong> <span id="activeIterationsOutput">256</span></div>
          <div><strong>Steps:</strong> <span id="stepOutput">0</span></div>
          <div><strong>Logs:</strong> <span id="logCountOutput">0</span></div>
          <div class="hint">Drag to pan. Scroll to zoom. Click to zoom in; right-click to zoom out.</div>
        </div>
      </aside>

      <main class="canvas-panel">
        <canvas id="fractalCanvas"></canvas>
      </main>
    </div>

  </body>
</html>
