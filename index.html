<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fractal Explorer</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div class="app-shell">
    <aside class="controls-panel">
      <h1>Fractal Explorer</h1>
      <p class="subtitle">Explore the complex plane in real time — pan, zoom, and jump to any coordinate.</p>

      <div id="navSentinel" aria-hidden="true"></div>
      <div id="coordNav" class="nav-card">
        <div class="nav-card-header">
          <span class="nav-card-title">Navigate</span>
          <div class="nav-card-actions">
            <button id="navCopyButton" type="button" class="nav-icon-button" title="Copy current coordinates">Copy</button>
            <button id="navPasteButton" type="button" class="nav-icon-button" title="Paste coordinates into Destination">Paste</button>
          </div>
        </div>

        <section id="navCurrentBlock" class="nav-block is-collapsed" data-block="current">
          <button id="navCurrentToggle" type="button" class="nav-block-toggle" aria-expanded="false" aria-controls="navCurrentBody">
            <span class="nav-block-chevron" aria-hidden="true">▸</span>
            <span class="nav-block-title">Current</span>
            <span id="navCurrentSummary" class="nav-block-summary"></span>
          </button>
          <div id="navCurrentBody" class="nav-block-body">
            <div class="nav-block-inner">
              <div class="nav-field">
                <label for="navReInput">Re</label>
                <input id="navReInput" type="text" inputmode="decimal" spellcheck="false" autocomplete="off" readonly />
              </div>
              <div class="nav-field">
                <label for="navImInput">Im</label>
                <input id="navImInput" type="text" inputmode="decimal" spellcheck="false" autocomplete="off" readonly />
              </div>
              <div class="nav-field">
                <label for="navZoomInput">Zoom</label>
                <input id="navZoomInput" type="text" inputmode="decimal" spellcheck="false" autocomplete="off" readonly />
              </div>
              <div class="nav-button-row">
                <button id="navOriginButton" type="button" class="nav-secondary">Origin</button>
              </div>
            </div>
          </div>
        </section>

        <section id="navDestinationBlock" class="nav-block is-collapsed" data-block="destination">
          <button id="navDestinationToggle" type="button" class="nav-block-toggle" aria-expanded="false" aria-controls="navDestinationBody">
            <span class="nav-block-chevron" aria-hidden="true">▸</span>
            <span class="nav-block-title">Destination</span>
            <span id="navDestinationSummary" class="nav-block-summary"></span>
          </button>
          <div id="navDestinationBody" class="nav-block-body">
            <div class="nav-block-inner">
              <div class="nav-field">
                <label for="destReInput">Re</label>
                <input id="destReInput" type="text" inputmode="decimal" spellcheck="false" autocomplete="off" />
              </div>
              <div class="nav-field">
                <label for="destImInput">Im</label>
                <input id="destImInput" type="text" inputmode="decimal" spellcheck="false" autocomplete="off" />
              </div>
              <div class="nav-field">
                <label for="destZoomInput">Zoom</label>
                <input id="destZoomInput" type="text" inputmode="decimal" spellcheck="false" autocomplete="off" />
              </div>
              <div class="nav-button-row">
                <button id="destJumpButton" type="button">Jump</button>
                <button id="destFlyToButton" type="button" class="nav-secondary">Fly To</button>
              </div>
            </div>
          </div>
        </section>
      </div>

      <div id="settingsContainer"></div>

      <hr class="section-divider" />

      <div class="button-row">
        <button id="renderButton" type="button">Render</button>
      </div>

      <div class="button-row">
        <button id="exportLogsButton" type="button">Export logs</button>
        <button id="benchmarkButton" type="button">Benchmark sweep</button>
      </div>

      <div class="stats-card">
        <div><strong>Last render:</strong> <span id="lastRenderOutput">—</span></div>
        <div><strong>Zoom:</strong> <span id="zoomOutput">1.00×</span></div>
        <div><strong>Iterations:</strong> <span id="activeIterationsOutput">256</span></div>
        <div><strong>Steps:</strong> <span id="stepOutput">0</span></div>
        <div><strong>Logs:</strong> <span id="logCountOutput">0</span></div>
        <div class="hint">Drag to pan. Scroll to zoom. Click to zoom in; right-click to zoom out.</div>
      </div>
    </aside>

    <main class="canvas-panel">
      <div class="canvas-overlay">
        <div id="renderStatusBadge" class="render-status-badge" aria-live="polite">
          <span id="renderStatusDot" class="render-status-dot rendering"></span>
          <span id="renderStatusText" class="render-status-text">Rendering...</span>
          <span id="renderStatusTimer" class="render-status-timer">| 0.0 ms</span>
        </div>
      </div>
      <canvas id="fractalCanvas"></canvas>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
